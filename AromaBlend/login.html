<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AromaBlend | Secure Access</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header></header>

    <section class="form-shell-section">
        <div class="form-premium-card">
            <h2>Welcome Back</h2>
            <p class="form-subtitle">Enter credentials to unlock your signature house menu controls.</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="log-email" required placeholder="user@domain.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="log-pass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-form-submit">Login</button>
            </form>
            <p class="auth-switch-text">New to the house? <a href="signup.html">Create an Account</a></p>
        </div>
    </section>

    <footer></footer>
    <script src="script.js"></script>
</body>
</html>
