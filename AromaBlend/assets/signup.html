<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AromaBlend | Join Roastery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header></header>

    <section class="form-shell-section">
        <div class="form-premium-card">
            <h2>Enroll Account</h2>
            <p class="form-subtitle">Register your database node for premium ordering access privileges.</p>
            
            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" required placeholder="Enter name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" required placeholder="user@domain.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-pass" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="reg-confirm" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-form-submit">Create Account</button>
            </form>
            <p class="auth-switch-text">Possess existing identity? <a href="login.html">Sign In Here</a></p>
        </div>
    </section>

    <footer></footer>
    <script src="script.js"></script>
</body>
</html>
